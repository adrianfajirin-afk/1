<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agis & Ilmi - Share Moment Demo</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f7f3ed;color:#333}
.header{text-align:center;padding:18px;background:#fff}
.page{padding:12px}
button{border:none;border-radius:999px;padding:14px 18px;cursor:pointer}
.primary{width:100%;font-size:18px}
video,img{width:100%;border-radius:18px}
.cameraBar{display:flex;justify-content:space-around;align-items:center;padding:12px;background:#fff;position:sticky;bottom:0}
.shutter{width:72px;height:72px;border-radius:50%;font-size:28px}
.feed{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card img{width:100%;aspect-ratio:4/5;object-fit:cover}
.icons{display:flex;justify-content:space-around;padding:8px}
.icons a,.icons button{background:none;border:none;text-decoration:none;color:black}
.previewImg{max-height:55vh;object-fit:cover}
#cameraPage,#previewPage{display:none}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99}
.modal img{width:100%;max-height:80vh;object-fit:contain}
.modalContent{padding:10px;color:white;text-align:center}
.close{position:absolute;top:10px;right:10px}
</style>
</head>
<body>

<div class="header">
<h2>🤍 Agis & Ilmi</h2>
<p>Kamis, 26 Maret 2026</p>
</div>

<div id="homePage" class="page">
<button class="primary" onclick="openCamera()">📷 Mulai Photobooth</button>

<h3>📷 Memories Feed</h3>
<div id="feed" class="feed"></div>
</div>

<div id="cameraPage" class="page">
<video id="video" autoplay playsinline></video>

<div class="cameraBar">
<button onclick="switchCam()">🔄</button>
<button class="shutter" onclick="takePhoto()">⚪</button>
<button onclick="backHome()">✖️</button>
</div>
</div>

<div id="previewPage" class="page">
<img id="previewImg" class="previewImg">

<h3>🎤 Voice Note</h3>
<button id="recBtn" class="primary" onclick="toggleRec()">🎤 Rekam Voice Note</button>

<p id="voiceStatus">Belum ada rekaman</p>

<audio id="audioPreview" controls style="width:100%;display:none"></audio>

<br><br>

<button class="primary" onclick="shareMoment()">💌 Share Moment</button>
<br><br>
<button class="primary" onclick="retake()">🔁 Ambil Ulang Foto</button>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<button class="close">❌</button>
<img id="modalImg">
<div class="modalContent">
<a id="downloadBtn" download="moment.jpg" style="color:white">⬇️ Download</a>
&nbsp;&nbsp;&nbsp;
<button style="color:white">▶️ Voice</button>
&nbsp;&nbsp;&nbsp;
<button style="color:white">📤 Share</button>
</div>
</div>

<script>
let facing='user';
let stream;
let photoData=null;
let audioURL=null;
let recorder=null;
let recording=false;
let chunks=[];

function show(id){
 homePage.style.display='none';
 cameraPage.style.display='none';
 previewPage.style.display='none';
 document.getElementById(id).style.display='block';
}

function backHome(){ show('homePage'); }

async function startCam(){
 try{
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing}});
  video.srcObject=stream;
 }catch(e){}
}

function openCamera(){
 show('cameraPage');
 startCam();
}

async function switchCam(){
 facing=facing==='user'?'environment':'user';
 await startCam();
}

function takePhoto(){
 const c=document.createElement('canvas');
 c.width=video.videoWidth||640;
 c.height=video.videoHeight||480;
 c.getContext('2d').drawImage(video,0,0);
 photoData=c.toDataURL('image/jpeg');
 previewImg.src=photoData;
 show('previewPage');
}

async function toggleRec(){
 if(!recording){
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(s);
  chunks=[];
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=()=>{
   const blob=new Blob(chunks,{type:'audio/webm'});
   audioURL=URL.createObjectURL(blob);
   audioPreview.src=audioURL;
   audioPreview.style.display='block';
   voiceStatus.innerText='✅ Voice Note Siap';
  };
  recorder.start();
  recBtn.innerText='⏹️ Stop Rekam';
  recording=true;
 }else{
  recorder.stop();
  recBtn.innerText='🎤 Rekam Voice Note';
  recording=false;
 }
}

function shareMoment(){
 if(!photoData){
  alert('Belum ada foto');
  return;
 }

 const card=document.createElement('div');
 card.className='card';

 card.innerHTML=`
 <img src="${photoData}" onclick="openModal('${photoData}')">
 <div class="icons">
 <button>▶️</button>
 <a href="${photoData}" download="moment.jpg">⬇️</a>
 <button>📤</button>
 </div>`;

 feed.prepend(card);

 show('homePage');
}

function retake(){
 openCamera();
}

function openModal(src){
 modal.style.display='block';
 modalImg.src=src;
 downloadBtn.href=src;
}

function closeModal(){
 modal.style.display='none';
}
</script>

</body>
</html>
